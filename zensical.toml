[project]
site_name = "FastOMOP Documentation"
site_description = "Natural language interface for OMOP CDM clinical databases"
site_url = "https://fastomop.github.io/agno_fastomop/"
repo_name = "fastomop/agno_fastomop"
repo_url = "https://github.com/fastomop/agno_fastomop"
edit_uri = "edit/main/docs/"
copyright = "Copyright &copy; FastOMOP contributors"
docs_dir = "docs"

nav = [
  { "Home" = "index.md" },
]

[project.theme]
variant = "classic"
features = [
  "navigation.instant",
  "navigation.tracking",
  "navigation.tabs",
  "navigation.top",
  "toc.follow",
  "search.highlight",
  "content.code.copy",
  "content.action.edit",
]

[project.theme.icon]
repo = "fontawesome/brands/github"
